quarkus.datasource.url=jdbc:h2:mem:app-concessionaria;DB_CLOSE_DELAY=-1
quarkus.datasource.driver=org.h2.Driver
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.dialect=org.hibernate.dialect.H2Dialect
quarkus.hibernate-orm.sql-load-script=import.sql
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger
quarkus.smallrye-openapi.path=/openapi
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:default
quarkus.datasource.username=sa
quarkus.datasource.password=sa
quarkus.hibernate-orm.log.sql=true

# API Key Configuration
quarkus.api-key.value=your-secret-api-key-2024
quarkus.api-key.header-name=X-API-Key

# Security Configuration
quarkus.http.auth.permission.public.paths=/public/*,/q/*,/swagger,/openapi
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.public.methods=GET